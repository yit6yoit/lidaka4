<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grozs — LĪDAKA4</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --cyan:#00e5ff; --deep:#001622; --mid:#002a40; --teal:#0099bb; --accent:#00ffcc; --text:#cce8f0; --muted:#5a8a99; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--deep);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(0,150,200,0.1) 0%,transparent 60%);pointer-events:none;z-index:0;}

    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(0,22,34,0.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,200,230,0.12);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--cyan);letter-spacing:-1px;text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    nav ul{list-style:none;display:flex;gap:32px;}
    nav ul a{color:var(--text);text-decoration:none;font-size:.92rem;font-weight:500;transition:color .2s;}
    nav ul a:hover{color:var(--cyan);}
    .nav-cart{background:var(--teal);color:#fff;border:none;padding:9px 22px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;font-size:.9rem;transition:background .2s;position:relative;}
    .nav-cart:hover{background:var(--cyan);color:var(--deep);}
    #cart-count{position:absolute;top:-8px;right:-8px;background:var(--accent);color:var(--deep);border-radius:50%;width:20px;height:20px;font-size:.72rem;font-weight:700;display:none;align-items:center;justify-content:center;}

    .cart-wrap{max-width:900px;margin:0 auto;padding:60px 24px 100px;position:relative;z-index:1;}
    .cart-header{margin-bottom:40px;}
    .cart-header h1{font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800;color:#fff;letter-spacing:-1px;}
    .cart-header p{color:var(--muted);margin-top:6px;}

    .cart-layout{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;}

    /* Items */
    .cart-items{}
    .empty-state{text-align:center;padding:60px 20px;border:1px dashed rgba(0,180,220,.2);border-radius:14px;}
    .empty-state .icon{font-size:3rem;margin-bottom:16px;display:block;}
    .empty-state h3{font-family:'Syne',sans-serif;font-size:1.3rem;color:#fff;margin-bottom:8px;}
    .empty-state p{color:var(--muted);margin-bottom:24px;font-size:.9rem;}
    .btn-browse{display:inline-block;background:var(--teal);color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;transition:background .2s;}
    .btn-browse:hover{background:var(--cyan);color:var(--deep);}

    .cart-item{background:rgba(0,16,28,.7);border:1px solid rgba(0,180,220,.15);border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px;transition:border-color .2s;}
    .cart-item:hover{border-color:rgba(0,230,255,.25);}
    .item-icon{font-size:2rem;flex-shrink:0;}
    .item-info{flex:1;}
    .item-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;margin-bottom:4px;}
    .item-meta{font-size:.8rem;color:var(--muted);}
    .item-qty{display:flex;align-items:center;gap:10px;}
    .qty-btn{background:rgba(0,150,180,.2);border:1px solid rgba(0,200,230,.2);color:var(--cyan);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;font-weight:700;transition:background .2s;display:flex;align-items:center;justify-content:center;}
    .qty-btn:hover{background:rgba(0,200,230,.3);}
    .qty-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#fff;min-width:24px;text-align:center;}
    .item-price{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--cyan);margin-left:auto;flex-shrink:0;}
    .remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;margin-left:12px;transition:color .2s;padding:4px;}
    .remove-btn:hover{color:#ff4466;}

    /* Summary */
    .cart-summary{background:rgba(0,16,28,.8);border:1px solid rgba(0,180,220,.2);border-radius:14px;padding:28px;position:sticky;top:90px;}
    .cart-summary h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:24px;}
    .summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.9rem;}
    .summary-row .label{color:var(--muted);}
    .summary-row .val{color:var(--text);font-weight:500;}
    .summary-divider{border:none;border-top:1px solid rgba(0,150,180,.15);margin:16px 0;}
    .summary-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
    .summary-total .label{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#fff;}
    .summary-total .val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--accent);}
    .btn-checkout{display:block;width:100%;background:var(--cyan);color:var(--deep);padding:14px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:background .2s,transform .2s;box-shadow:0 0 30px rgba(0,230,255,.2);}
    .btn-checkout:hover{background:var(--accent);transform:translateY(-2px);}
    .btn-checkout:disabled{background:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}
    .secure-note{text-align:center;font-size:.75rem;color:var(--muted);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:4px;}

    .promo-row{margin-top:20px;}
    .promo-row label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:6px;}
    .promo-input-wrap{display:flex;gap:8px;}
    .promo-input{flex:1;background:rgba(0,30,50,.6);border:1px solid rgba(0,180,220,.2);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.88rem;outline:none;}
    .promo-input:focus{border-color:var(--cyan);}
    .promo-btn{background:var(--teal);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;transition:background .2s;}
    .promo-btn:hover{background:var(--cyan);color:var(--deep);}

    @media(max-width:760px){
      nav{padding:0 20px;} nav ul{display:none;}
      .cart-layout{grid-template-columns:1fr;}
      .cart-summary{position:static;}
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">LĪDAKA<span>4</span></a>
  <ul>
    <li><a href="index.html">Sākums</a></li>
    <li><a href="plans.html">Plāni</a></li>
  </ul>
  <a class="nav-cart" href="cart.html">🛒 Grozs<span id="cart-count">0</span></a>
</nav>

<div class="cart-wrap">
  <div class="cart-header">
    <h1>🛒 Tavs Grozs</h1>
    <p id="cart-subtitle">Ielādē...</p>
  </div>

  <div class="cart-layout">
    <div class="cart-items" id="cart-items-container"></div>

    <div class="cart-summary">
      <h2>Kopsavilkums</h2>
      <div class="summary-row"><span class="label">Plāni</span><span class="val" id="sum-plans">—</span></div>
      <div class="summary-row"><span class="label">Daudzums</span><span class="val" id="sum-qty">—</span></div>
      <hr class="summary-divider">
      <div class="summary-total">
        <span class="label">Kopā / mēnesī</span>
        <span class="val" id="sum-total">€0.00</span>
      </div>
      <a href="checkout.html" class="btn-checkout" id="checkout-btn">Noformēt Pasūtījumu →</a>
      <div class="secure-note">🔒 Droša SSL šifrēta apmaksa</div>

      <div class="promo-row">
        <label>Promo kods</label>
        <div class="promo-input-wrap">
          <input type="text" class="promo-input" placeholder="LIDAKA2025" id="promo-input"/>
          <button class="promo-btn" onclick="applyPromo()">Pielietot</button>
        </div>
        <p id="promo-msg" style="font-size:.75rem;margin-top:6px;color:var(--muted);"></p>
      </div>
    </div>
  </div>
</div>

<script>
const ICONS = { 'Bomzis':'🦆','Kaļjans':'💨','Meinards':'🎩','Miljardieris':'💎' };
const DESCS = {
  'Bomzis':'90 min · 500 SMS · 50 GB Latvijā',
  'Kaļjans':'500 min · Bezlimita SMS Eiropā · Bezlimita internets Baltijā',
  'Meinards':'Bezlimita zvani, SMS · 100 GB Eiropā',
  'Miljardieris':'Bezlimita viss Eiropā un vairāk'
};

function getCart(){try{const c=document.cookie.split(';').find(r=>r.trim().startsWith('l4cart='));return c?JSON.parse(decodeURIComponent(c.trim().substring(7))):[];}catch{return[];}}
function saveCart(cart){const e=new Date();e.setFullYear(e.getFullYear()+1);document.cookie='l4cart='+encodeURIComponent(JSON.stringify(cart))+'; expires='+e.toUTCString()+'; path=/';}

function updateAll() {
  const cart = getCart();
  const container = document.getElementById('cart-items-container');
  const subtitle = document.getElementById('cart-subtitle');
  const sumPlans = document.getElementById('sum-plans');
  const sumQty = document.getElementById('sum-qty');
  const sumTotal = document.getElementById('sum-total');
  const checkoutBtn = document.getElementById('checkout-btn');
  const cartCount = document.getElementById('cart-count');

  const totalQty = cart.reduce((s,i)=>s+i.qty,0);
  const totalPrice = cart.reduce((s,i)=>s+i.price*i.qty,0);

  // Update nav badge
  if(totalQty>0){cartCount.style.display='flex';cartCount.textContent=totalQty;}else{cartCount.style.display='none';}

  if(cart.length===0){
    subtitle.textContent='Grozs ir tukšs';
    container.innerHTML = `<div class="empty-state">
      <span class="icon">🐟</span>
      <h3>Grozs ir tukšs</h3>
      <p>Izpēti mūsu plānus un pievieno sev piemērotāko!</p>
      <a href="plans.html" class="btn-browse">Skatīt Plānus →</a>
    </div>`;
    sumPlans.textContent='—'; sumQty.textContent='—'; sumTotal.textContent='€0.00';
    checkoutBtn.setAttribute('disabled','');
    return;
  }

  checkoutBtn.removeAttribute('disabled');
  subtitle.textContent = totalQty + ' vienība' + (totalQty!==1?'s':'') + ' grozā';
  sumPlans.textContent = cart.length;
  sumQty.textContent = totalQty;
  sumTotal.textContent = '€' + totalPrice.toFixed(2);

  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="item-icon">${ICONS[item.name]||'📦'}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${DESCS[item.name]||''}</div>
      </div>
      <div class="item-qty">
        <button class="qty-btn" onclick="changeQty('${item.name}',-1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.name}',1)">+</button>
      </div>
      <div class="item-price">€${(item.price*item.qty).toFixed(2)}</div>
      <button class="remove-btn" onclick="removeItem('${item.name}')" title="Noņemt">✕</button>
    </div>
  `).join('');
}

function changeQty(name, delta){
  const cart=getCart();
  const item=cart.find(i=>i.name===name);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0){const idx=cart.indexOf(item);cart.splice(idx,1);}
  saveCart(cart); updateAll();
}

function removeItem(name){
  let cart=getCart();
  cart=cart.filter(i=>i.name!==name);
  saveCart(cart); updateAll();
}

function applyPromo(){
  const code=document.getElementById('promo-input').value.trim().toUpperCase();
  const msg=document.getElementById('promo-msg');
  if(code==='LIDAKA2025'||code==='ZIVS'||code==='LATVIJA'){
    msg.style.color='var(--accent)'; msg.textContent='✓ Promo kods pielietots! 10% atlaide aktivizēta.';
  } else {
    msg.style.color='#ff6688'; msg.textContent='✗ Promo kods nav derīgs.';
  }
}

updateAll();
</script>
</body>
</html>
